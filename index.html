<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fafaf9" />
    <title>My Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script type="module" src="/src/main.js"></script>
    <div class="page">
      <!-- Header -->
      <header class="header">
        <div class="header-inner">
          <div class="logo-group">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span class="logo-text">My Apps</span>
          </div>
        </div>
      </header>

      <main class="main">
        <!-- 应用 -->
        <section class="section">
          <h2 class="section-title">应用</h2>
          <div class="grid">

            <a href="https://resume.playai.cloud-ip.cc" class="card" target="_blank" rel="noopener">
              <div class="card-icon" style="background: linear-gradient(135deg, #fef3c7, #fde68a);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10 9 9 9 8 9"/>
                </svg>
              </div>
              <div class="card-body">
                <div class="card-title">简履</div>
                <div class="card-subtitle">Resume Maker</div>
                <div class="card-desc">在线简历制作工具，3 种模板，支持 Word 导入导出与 PDF 导出</div>
              </div>
              <div class="card-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"/>
                  <polyline points="7 7 17 7 17 17"/>
                </svg>
              </div>
            </a>

            <a href="https://photo.playai.cloud-ip.cc" class="card" target="_blank" rel="noopener">
              <div class="card-icon" style="background: linear-gradient(135deg, #dbeafe, #bfdbfe);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
              </div>
              <div class="card-body">
                <div class="card-title">框影</div>
                <div class="card-subtitle">Photo Frame</div>
                <div class="card-desc">照片边框与水印工具，21 种模板，自动读取 EXIF 参数</div>
              </div>
              <div class="card-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"/>
                  <polyline points="7 7 17 7 17 17"/>
                </svg>
              </div>
            </a>

            <a href="https://salary-ai-help.cc.cd" class="card" target="_blank" rel="noopener">
              <div class="card-icon" style="background: linear-gradient(135deg, #ede9fe, #ddd6fe);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#5b21b6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="1" x2="12" y2="23"/>
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
              </div>
              <div class="card-body">
                <div class="card-title">薪资 AI</div>
                <div class="card-subtitle">Salary AI</div>
                <div class="card-desc">AI 驱动的薪资分析与谈判建议助手</div>
              </div>
              <div class="card-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"/>
                  <polyline points="7 7 17 7 17 17"/>
                </svg>
              </div>
            </a>

          </div>
        </section>

        <!-- 游戏 -->
        <section class="section">
          <h2 class="section-title">游戏</h2>
          <div class="grid">

            <a href="https://game-online.playai.cloud-ip.cc" class="card" target="_blank" rel="noopener">
              <div class="card-icon" style="background: linear-gradient(135deg, #dcfce7, #bbf7d0);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="2" width="20" height="20" rx="3"/>
                  <circle cx="8" cy="8" r="1.2"/>
                  <circle cx="16" cy="8" r="1.2"/>
                  <circle cx="8" cy="16" r="1.2"/>
                  <circle cx="16" cy="16" r="1.2"/>
                  <circle cx="12" cy="12" r="1.2"/>
                </svg>
              </div>
              <div class="card-body">
                <div class="card-title">大富翁</div>
                <div class="card-subtitle">Monopoly CN</div>
                <div class="card-desc">经典大富翁桌游在线版，支持多人联机与 AI 对战</div>
              </div>
              <div class="card-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"/>
                  <polyline points="7 7 17 7 17 17"/>
                </svg>
              </div>
            </a>

            <a href="https://game-snake.playai.cloud-ip.cc" class="card" target="_blank" rel="noopener">
              <div class="card-icon" style="background: linear-gradient(135deg, #fce7f3, #fbcfe8);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9d174d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 12c0-2 1-4 3-4s3 2 5 2 3-2 5-2 3 2 3 4"/>
                  <path d="M4 12c0 2 1 4 3 4s3-2 5-2 3 2 5 2 3-2 3-4"/>
                  <circle cx="7" cy="10" r="0.8" fill="#9d174d"/>
                </svg>
              </div>
              <div class="card-body">
                <div class="card-title">贪吃蛇</div>
                <div class="card-subtitle">Snake Game</div>
                <div class="card-desc">多人在线贪吃蛇对战，支持加速与重生机制</div>
              </div>
              <div class="card-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"/>
                  <polyline points="7 7 17 7 17 17"/>
                </svg>
              </div>
            </a>

          </div>
        </section>

        <!-- 快捷指令 -->
        <section class="section">
          <h2 class="section-title">快捷指令</h2>
          <div class="grid">

            <a href="/shortcuts/holiday-alarm.shortcut" class="card shortcut-download">
              <div class="card-icon" style="background: linear-gradient(135deg, #fee2e2, #fecaca);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#991b1b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
              <div class="card-body">
                <div class="card-title">节假日闹钟</div>
                <div class="card-subtitle">Holiday Alarm</div>
                <div class="card-desc">自动识别中国法定节假日和调休，工作日响铃，节假日静默</div>
              </div>
              <div class="card-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
              </div>
            </a>

          </div>
        </section>
      </main>

      <footer class="footer">
        <span>by Turbobo</span>
      </footer>
    </div>
  </body>
</html>
